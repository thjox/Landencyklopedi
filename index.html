<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="global.css" />
    <title>GlobalAtlas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav
        class="navbar bg-dark border-bottom border-body"
        data-bs-theme="dark"
      >
        <div
          class="container d-flex flex-wrap align-items-center justify-content-between"
        >
          <h1 class="text-info m-0">GlobalAtlas</h1>

          <div class="btn-group my-2" role="group">
            <button
              type="button"
              class="btn btn-outline-info"
              data-region="africa"
            >
              Afrika
            </button>
            <button
              type="button"
              class="btn btn-outline-info"
              data-region="americas"
            >
              Americas
            </button>
            <button
              type="button"
              class="btn btn-outline-info"
              data-region="asia"
            >
              Asia
            </button>
            <button
              type="button"
              class="btn btn-outline-info"
              data-region="europe"
            >
              Europe
            </button>
            <button
              type="button"
              class="btn btn-outline-info"
              data-region="oceania"
            >
              Oceania
            </button>
          </div>

          <form id="worldSearchForm" class="d-flex gap-2">
            <input
              type="text"
              id="worldSearchInput"
              class="form-control"
              placeholder="Search for a country"
            />
            <button type="submit" class="btn btn-outline-info">Search</button>
          </form>
        </div>
      </nav>
    </header>
    <main class="bg-dark min-vh-100">
      <div class="container py-4">
        <div id="countryCards" class="row g-4"></div>
      </div>
    </main>

    <div class="modal fade" id="countryModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light">
          <div class="modal-header">
            <h5 class="modal-title">Country</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body" id="modalBody"></div>
        </div>
      </div>
    </div>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
